name: Appium E2E — NewMomCircle Android

on:
  push:
    branches: [ "main", "develop" ]
    paths:
      - 'e2e/**'
      - 'apps/mobile/**'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      android_api:
        description: 'Android API level'
        required: false
        default: '33'
      test_suite:
        description: 'Test suite (auth/feed/forms/navigation/all)'
        required: false
        default: 'all'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-tests:
    name: E2E on Android ${{ matrix.api-level }}
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        api-level: [30, 33]

    env:
      EXECUTION_MODE: installed
      APP_PACKAGE:    host.exp.exponent
      APP_ACTIVITY:   host.exp.exponent.LauncherActivity
      APPIUM_HOST:    127.0.0.1
      APPIUM_PORT:    4723
      CI:             true

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Java ──────────────────────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── Node.js ───────────────────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      # ── KVM (emulator hardware acceleration) ──────────────────────────────────
      - name: Enable KVM for emulator acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # ── Install framework dependencies ────────────────────────────────────────
      - name: Install E2E framework dependencies
        working-directory: e2e
        run: npm ci

      # ── Appium ────────────────────────────────────────────────────────────────
      - name: Install Appium 2.x and UiAutomator2 driver
        run: |
          npm install -g appium
          appium driver install uiautomator2
          appium driver list

      # ── Start Appium server ───────────────────────────────────────────────────
      - name: Start Appium server
        run: |
          appium --log-level error --base-path / &
          sleep 5
          curl -s http://127.0.0.1:4723/status | jq .

      # ── Run tests inside emulator ─────────────────────────────────────────────
      - name: Run E2E tests on Android ${{ matrix.api-level }} emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level:   ${{ matrix.api-level }}
          target:      google_apis
          arch:        x86_64
          profile:     pixel_5
          avd-name:    NewMomCircle_API${{ matrix.api-level }}
          ram-size:    4096M
          heap-size:   512M
          disk-size:   6144M
          emulator-options: >
            -no-snapshot-save
            -no-window
            -gpu swiftshader_indirect
            -noaudio
            -no-boot-anim
          disable-animations: true
          script: |
            adb wait-for-device
            adb shell input keyevent 82
            # Install Expo Go for Expo-managed apps
            # adb install -r path/to/ExpoGo.apk
            cd e2e
            SUITE="${{ github.event.inputs.test_suite || 'all' }}"
            if [ "$SUITE" = "all" ]; then
              npm run test:ci
            else
              npm run test:$SUITE
            fi

      # ── Upload Mochawesome HTML report ────────────────────────────────────────
      - name: Generate HTML report
        if: always()
        working-directory: e2e
        run: npm run report || true

      - name: Upload Mochawesome HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mochawesome-report-api${{ matrix.api-level }}
          path: e2e/mochawesome-report/
          retention-days: 30

      # ── Upload Excel report ───────────────────────────────────────────────────
      - name: Upload Excel report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: excel-report-api${{ matrix.api-level }}
          path: e2e/excel/
          retention-days: 30

      # ── Upload screenshots ────────────────────────────────────────────────────
      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots-api${{ matrix.api-level }}
          path: |
            e2e/screenshots/
            e2e/reports/failures/
          retention-days: 14

      # ── Upload logs ───────────────────────────────────────────────────────────
      - name: Upload device logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: device-logs-api${{ matrix.api-level }}
          path: e2e/logs/
          retention-days: 14

      # ── Summary ───────────────────────────────────────────────────────────────
      - name: Post test summary to GitHub Step Summary
        if: always()
        run: |
          echo "## 📊 E2E Test Results — API ${{ matrix.api-level }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Artifact | Location |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| HTML Report | mochawesome-report-api${{ matrix.api-level }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Excel Report | excel-report-api${{ matrix.api-level }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Screenshots | screenshots-api${{ matrix.api-level }} |" >> $GITHUB_STEP_SUMMARY
